name: Build Telegram X Mod

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Check submodules
        run: |
          ls -la vkryl/leveldb && echo "leveldb OK" || echo "leveldb missing - check .gitmodules!"
          ls -la tdlib && echo "tdlib OK" || echo "tdlib missing!"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace --info --warning-mode none  # none ignora depreciações temporariamente

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TelegramX-Mod-APK
          path: app/build/outputs/apk/release/*.apk
