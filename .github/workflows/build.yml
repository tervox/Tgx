name: Build Telegram X

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify submodules cloned
        run: |
          ls -la vkryl/leveldb || echo "ERRO: vkryl/leveldb não existe!"
          ls -la tdlib || echo "ERRO: tdlib não existe!"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ... resto igual: setup Android SDK, local.properties, chmod gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace --info --warning-mode all

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
