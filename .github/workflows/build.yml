name: Build Telegram X

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone submodules
        run: |
          set -e
          rm -rf vkryl/leveldb vkryl/core vkryl/td vkryl/android tdlib \
            app/jni/third_party/jni-utils app/jni/third_party/webp app/jni/third_party/lz4 \
            app/jni/third_party/ffmpeg app/jni/third_party/flac app/jni/third_party/opus \
            app/jni/third_party/opusfile app/jni/third_party/ogg app/jni/third_party/libvpx \
            app/jni/third_party/rlottie app/jni/third_party/libyuv \
            app/jni/tgvoip/third_party/libtgvoip app/jni/tgvoip/third_party/usrsctp \
            app/jni/tgvoip/third_party/libsrtp app/jni/tgvoip/third_party/openh264 \
            app/jni/tgvoip/third_party/abseil-cpp app/jni/tgvoip/third_party/webrtc \
            app/jni/tgvoip/third_party/tgcalls app/jni/tgvoip/third_party/libevent \
            app/jni/tgvoip/third_party/crc32c app/jni/tgvoip/third_party/rnnoise \
            app/jni/tgvoip/third_party/webrtc_deps/third_party \
            app/jni/tgvoip/third_party/webrtc_deps/base \
            thirdparty/androidx-media/legacy thirdparty/androidx-media/latest thirdparty/androidx-media/lollipop

          git clone --depth=1 --branch main --recurse-submodules https://github.com/TGX-Android/leveldb vkryl/leveldb
          git clone --depth=1 --branch main https://github.com/TGX-Android/X-Core vkryl/core
          git clone --depth=1 --branch main https://github.com/TGX-Android/tdlib-utils vkryl/td
          git clone --depth=1 --branch main https://github.com/TGX-Android/X-Android vkryl/android
          git clone --depth=1 --branch main --recurse-submodules https://github.com/TGX-Android/tdlib tdlib
          git clone --depth=1 --branch main https://github.com/TGX-Android/jni-utils app/jni/third_party/jni-utils
          git clone --depth=1 --branch 1.4.0 https://github.com/webmproject/libwebp app/jni/third_party/webp
          git clone --depth=1 https://github.com/lz4/lz4 app/jni/third_party/lz4
          git clone --depth=1 --branch release/6.1 https://github.com/FFmpeg/FFmpeg app/jni/third_party/ffmpeg
          git clone --depth=1 https://github.com/xiph/flac app/jni/third_party/flac
          git clone --depth=1 https://github.com/xiph/opus app/jni/third_party/opus
          git clone --depth=1 https://github.com/xiph/opusfile app/jni/third_party/opusfile
          git clone --depth=1 https://github.com/xiph/ogg app/jni/third_party/ogg
          git clone --depth=1 https://github.com/webmproject/libvpx app/jni/third_party/libvpx
          git clone --depth=1 --branch main https://github.com/TGX-Android/rlottie app/jni/third_party/rlottie
          git clone --depth=1 https://chromium.googlesource.com/libyuv/libyuv app/jni/third_party/libyuv
          git clone --depth=1 --branch tgx https://github.com/TGX-Android/libtgvoip app/jni/tgvoip/third_party/libtgvoip
          git clone --depth=1 https://github.com/sctplab/usrsctp app/jni/tgvoip/third_party/usrsctp
          git clone https://chromium.googlesource.com/chromium/deps/libsrtp app/jni/tgvoip/third_party/libsrtp
          cd app/jni/tgvoip/third_party/libsrtp && git checkout 860492290f7d1f25e2bd45da6471bfd4cd4d7add && cd -
          git clone --depth=1 --branch v2.4.1 https://github.com/cisco/openh264 app/jni/tgvoip/third_party/openh264
          git clone --depth=1 https://github.com/abseil/abseil-cpp app/jni/tgvoip/third_party/abseil-cpp
          git clone --depth=1 https://github.com/TGX-Android/webrtc app/jni/tgvoip/third_party/webrtc
          git clone https://github.com/TelegramMessenger/tgcalls app/jni/tgvoip/third_party/tgcalls
          cd app/jni/tgvoip/third_party/tgcalls && git checkout c89f009c29e7142f1935383a978f2ad7c46da4d1 && cd -
          git clone --depth=1 --branch main https://github.com/TGX-Android/libevent app/jni/tgvoip/third_party/libevent
          git clone --depth=1 --branch main https://github.com/google/crc32c app/jni/tgvoip/third_party/crc32c
          git clone --depth=1 --branch master https://github.com/xiph/rnnoise app/jni/tgvoip/third_party/rnnoise
          mkdir -p app/jni/tgvoip/third_party/webrtc_deps/third_party
          git clone --depth=1 --branch master https://github.com/xiph/rnnoise app/jni/tgvoip/third_party/webrtc_deps/third_party/rnnoise
          git clone --depth=1 https://chromium.googlesource.com/chromium/src/third_party/pffft app/jni/tgvoip/third_party/webrtc_deps/third_party/pffft
          git clone --depth=1 --branch release https://github.com/androidx/media thirdparty/androidx-media/legacy
          git clone --depth=1 --branch release https://github.com/androidx/media thirdparty/androidx-media/latest
          git clone --depth=1 --branch release https://github.com/androidx/media thirdparty/androidx-media/lollipop

      - name: Patch opus ASM files
        run: |
          cd app/jni/third_party/opus
          ASM_CONVERTER="./celt/arm/arm2gnu.pl"
          while read file; do
            if [[ ! "${file}" =~ .*_gnu\.s$ ]]; then
              gnu_file="${file%.s}_gnu.s"
              ${ASM_CONVERTER} "${file}" > "${gnu_file}"
              perl -pi -e "s/-gnu\.S/_gnu\.s/g" "${gnu_file}"
              rm -f "${file}"
            fi
          done < <(find . -iname '*.s')
          sed \
            -e "s/@OPUS_ARM_MAY_HAVE_EDSP@/1/g" \
            -e "s/@OPUS_ARM_MAY_HAVE_MEDIA@/1/g" \
            -e "s/@OPUS_ARM_MAY_HAVE_NEON@/1/g" \
            celt/arm/armopts.s.in > celt/arm/armopts.s.temp
          ${ASM_CONVERTER} "celt/arm/armopts.s.temp" > "celt/arm/armopts_gnu.s"
          rm "celt/arm/armopts.s.temp"
          echo "Opus patch done"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;23.2.8568313"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "telegram.api_id=${{ secrets.TELEGRAM_API_ID }}" >> local.properties
          echo "telegram.api_hash=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
