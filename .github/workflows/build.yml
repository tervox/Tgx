name: Build Telegram X Mod

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # roda manual na aba Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Debug folders
        run: |
          echo "Pastas vkryl/leveldb:"
          ls -la vkryl/leveldb || echo "leveldb faltando - verifique .gitmodules"
          echo "tdlib:"
          ls -la tdlib || echo "tdlib faltando"
          echo "Outras pastas nativas:"
          ls -la app/jni/third_party || echo "jni/third_party faltando"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --info --warning-mode none

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TelegramX-Mod-APK
          path: app/build/outputs/apk/release/*.apk
