name: Build Telegram X

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove empty submodule dirs and clone
        run: |
          set -e
          rm -rf vkryl/leveldb vkryl/core vkryl/td vkryl/android tdlib app/jni/third_party/jni-utils
          git clone --depth=1 --branch main https://github.com/TGX-Android/leveldb vkryl/leveldb
          git clone --depth=1 --branch main https://github.com/TGX-Android/X-Core vkryl/core
          git clone --depth=1 --branch main https://github.com/TGX-Android/tdlib-utils vkryl/td
          git clone --depth=1 --branch main https://github.com/TGX-Android/X-Android vkryl/android
          git clone --depth=1 --branch main https://github.com/TGX-Android/tdlib tdlib
          git clone --depth=1 --branch main https://github.com/TGX-Android/jni-utils app/jni/third_party/jni-utils

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
